# KV Kart Database
# Credentials: user=diya, password=diya_password, database=kvkart
# Connection: mysql://diya:diya_password@localhost:3306/kvkart
# Adminer: http://localhost:8080
#
# streamlit, platform, mcp mount repo at /app. evaluation mounts backend + checkpoints.
# After changing src/agents or src/graphs, restart: docker compose restart streamlit (or platform).

services:
  kvkart-db:
    image: nirkv/kvkart-db:latest
    container_name: kvkart-db
    ports:
      - "3306:3306"
    volumes:
      - kvkart_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: kvkart_root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pkvkart_root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.29.0
    container_name: weaviate
    ports:
      - "8090:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_API_BASED_MODULES: "false"
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # mcp:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: agent-mcp
  #   command: ["/usr/local/bin/python", "-m", "src.mcp.server"]
  #   environment:
  #     - MCP_HOST=0.0.0.0
  #     - MCP_PORT=8000
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - .:/app
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 8000)); s.close()"]
  #     interval: 2s
  #     timeout: 2s
  #     retries: 10
  #     start_period: 15s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-chat-ui
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=poll
      - STREAMLIT_SERVER_RUN_ON_SAVE=true
      - WEAVIATE_URL=http://weaviate:8080
      - MYSQL_HOST=kvkart-db
    stdin_open: true
    tty: true
    depends_on:
      kvkart-db:
        condition: service_healthy
      weaviate:
        condition: service_healthy

  platform:
    build:
      context: .
      dockerfile: platform/Dockerfile
    container_name: agent-platform
    ports:
      - "0.0.0.0:8081:8081"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - WEAVIATE_URL=http://weaviate:8080
      - MYSQL_HOST=kvkart-db
    depends_on:
      kvkart-db:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  evaluation:
    build:
      context: .
      dockerfile: evaluation/Dockerfile
    container_name: agent-evaluation
    ports:
      - "3000:8000"
    volumes:
      - ./evaluation/backend:/app/backend
      - ./evaluation/checkpoints.yaml:/app/checkpoints.yaml
    env_file: .env
    depends_on:
      platform:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  adminer:
    image: adminer:latest
    container_name: kvkart-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: kvkart-db
    depends_on:
      kvkart-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kvkart_data:
  weaviate_data:
